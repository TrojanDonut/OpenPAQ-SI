services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: openpaq-clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - openpaq-network

  clickhouse-init:
    image: clickhouse/clickhouse-server:latest
    container_name: openpaq-clickhouse-init
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./scripts/setup_clickhouse_si.sql:/setup_clickhouse_si.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for ClickHouse to be ready...' &&
      until clickhouse-client --host=clickhouse --port=9000 --user=default --password=default --query='SELECT 1' 2>/dev/null; do
        echo 'ClickHouse is not ready yet, waiting...'
        sleep 2
      done &&
      echo 'ClickHouse is ready! Running initialization script...' &&
      clickhouse-client --host=clickhouse --port=9000 --user=default --password=default --multiquery < /setup_clickhouse_si.sql &&
      echo 'Initialization complete!'
      "
    networks:
      - openpaq-network
    restart: "no"

  haproxy:
    image: haproxy:2.9-alpine
    container_name: openpaq-haproxy
    profiles:
      - nominatim-proxy
    ports:
      - "8081:8081"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./delay.lua:/usr/local/etc/haproxy/delay.lua:ro
    networks:
      - openpaq-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

  openpaq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openpaq-server
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
      haproxy:
        condition: service_healthy
        required: false
    ports:
      - "${WEBSERVER_PORT:-8080}:8080"
    environment:
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # Version
      VERSION: ${VERSION:-dev}
      
      # ClickHouse Configuration
      CLICKHOUSE_ENABLED: "true"
      CLICKHOUSE_DB_HOST: clickhouse
      CLICKHOUSE_DB_PORT: "9000"
      CLICKHOUSE_DB_USERNAME: default
      CLICKHOUSE_DB_PASSWORD: default
      CLICKHOUSE_DB_DATABASE: default
      CLICKHOUSE_DB_TABLE: slovenian_addresses
      CLICKHOUSE_COUNTRY: si
      
      # Web Server Configuration
      WEBSERVER_LISTEN_ADDRESS: ${WEBSERVER_LISTEN_ADDRESS:-0.0.0.0:8080}
      
      # Nominatim Configuration
      # Default: Direct access to Nominatim
      # When using --profile nominatim-proxy, override with: NOMINATIM_ADDRESS=http://haproxy:8081/search
      #NOMINATIM_ADDRESS: http://haproxy:8081/search
      NOMINATIM_ADDRESS: ${NOMINATIM_ADDRESS:-none}
      
      # TLS Configuration (optional)
      USE_TLS: ${USE_TLS:-false}
      TLS_KEY_FILE_PATH: ${TLS_KEY_FILE_PATH:-}
      TLS_CERT_FILE_PATH: ${TLS_CERT_FILE_PATH:-}
      
      # JWT Configuration (optional)
      USE_JWT: ${USE_JWT:-false}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      
      # Cache Configuration (optional)
      CACHE_ENABLED: ${CACHE_ENABLED:-false}
      CACHE_URL: ${CACHE_URL:-}
    networks:
      - openpaq-network
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local

networks:
  openpaq-network:
    driver: bridge

