global
    log stdout format raw local0
    maxconn 4096
    lua-load /usr/local/etc/haproxy/delay.lua

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option forwardfor

# Rate limiting stick tables for tracking
backend rate_limit_second
    stick-table type ip size 100k expire 2s store http_req_rate(1s)

backend rate_limit_hour
    stick-table type ip size 100k expire 3601s store http_req_cnt

backend rate_limit_day
    stick-table type ip size 100k expire 86401s store http_req_cnt

# Frontend for Nominatim proxy with intelligent delay
frontend nominatim_proxy
    bind *:8081
    mode http
    
    # Track requests in rate limiting tables for monitoring
    http-request track-sc0 src table rate_limit_second
    http-request track-sc1 src table rate_limit_hour
    http-request track-sc2 src table rate_limit_day
    
    # Add a 2 second delay before forwarding to Nominatim
    # This gives ClickHouse time to respond first and win the race condition
    # when it has a perfect match. ClickHouse queries are near-instant (in-memory lookups)
    http-request lua.delay
    
    # Check rate limits - only block if severely exceeded
    # Allow some burst but enforce daily/hourly limits
    acl rate_limit_hr sc1_http_req_cnt(rate_limit_hour) ge 100
    acl rate_limit_day sc2_http_req_cnt(rate_limit_day) ge 500
    
    # Only block if daily or hourly limit exceeded (not per-second)
    http-request return status 429 content-type "application/json" string '{"error":"Rate limit exceeded"}' if rate_limit_hr || rate_limit_day
    
    # Add rate limit headers for debugging
    http-response set-header X-RateLimit-Second "1"
    http-response set-header X-RateLimit-Hour "100"
    http-response set-header X-RateLimit-Day "500"
    http-response set-header X-Delayed "true"
    
    # Forward to Nominatim backend
    default_backend nominatim_backend

# Backend for Nominatim
backend nominatim_backend
    mode http
    balance roundrobin
    option httpchk GET /search?q=test
    http-check expect status 200
    server nominatim1 nominatim.openstreetmap.org:443 check ssl verify none
    http-request set-header Host nominatim.openstreetmap.org
    http-request set-header User-Agent "OpenPAQ-HAProxy/1.0"

